name: CD - Deploy Contract and Frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      network:
        description: 'Stellar network to deploy to'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - mainnet

env:
  NETWORK: ${{ github.event.inputs.network || 'testnet' }}
  NEXT_PUBLIC_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_CONTRACT_ID || 'CCZ5A5UPHSPCHQTN6QDASZINGZ2PVQBWQJ2UTWDIR3MGDE2JVYGS6Q27' }}
  NEXT_PUBLIC_NATIVE_TOKEN_ID: ${{ secrets.NEXT_PUBLIC_NATIVE_TOKEN_ID || 'CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC' }}

jobs:
  deploy-contract:
    name: Deploy Soroban Contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Soroban contract (wasm32)
        run: |
          cd contracts
          cargo build --target wasm32-unknown-unknown --release
          echo "WASM_FILE=$(find target/wasm32-unknown-unknown/release -name '*.wasm' | head -1)" >> $GITHUB_ENV

      - name: Run contract tests before deploy
        run: |
          cd contracts
          cargo test

      - name: Install Stellar CLI
        run: cargo install stellar-cli --features opt
        continue-on-error: true

      - name: Deploy contract to ${{ env.NETWORK }}
        if: ${{ secrets.STELLAR_SECRET_KEY != '' }}
        run: |
          RPC_URL="https://soroban-testnet.stellar.org"
          PASSPHRASE="Test SDF Network ; September 2015"
          if [ "${{ env.NETWORK }}" = "mainnet" ]; then
            RPC_URL="https://mainnet.stellar.validationcloud.io/v1/${{ secrets.VALIDATION_CLOUD_KEY }}"
            PASSPHRASE="Public Global Stellar Network ; September 2015"
          fi
          CONTRACT_ID=$(stellar contract deploy \
            --wasm ${{ env.WASM_FILE }} \
            --source ${{ secrets.STELLAR_SECRET_KEY }} \
            --rpc-url "$RPC_URL" \
            --network-passphrase "$PASSPHRASE")
          echo "Deployed contract: $CONTRACT_ID"
          echo "DEPLOYED_CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_ENV
        continue-on-error: true

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-contract

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_CONTRACT_ID: ${{ env.NEXT_PUBLIC_CONTRACT_ID }}
          NEXT_PUBLIC_NATIVE_TOKEN_ID: ${{ env.NEXT_PUBLIC_NATIVE_TOKEN_ID }}

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel Production
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} || echo "Vercel pull skipped"
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} || echo "Vercel build skipped"
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} || echo "Deployment skipped (token not set)"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        continue-on-error: true
